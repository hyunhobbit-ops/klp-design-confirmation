<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLP KOREA 문서 생성기</title>
<style>
/* --- [기존 스타일 유지] --- */
:root{--klp-blue:#1F85FF;--klp-dark:#222327;--klp-beige:#F4F3EA;--klp-light-blue:#CDE6F7;--klp-white:#FFFFFF;--klp-red:#c41e3a;--klp-border:#dde3e9;--klp-orange:#E67E22;--klp-orange-light:#FEF0E0}
/* ... (중략) ... */

/* --- [수정사항 1: A4 규격 고정] --- */
.preview-wrap {
    width: 794px; /* A4 너비 */
    height: 1123px; /* A4 높이 */
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden; /* 영역 밖으로 나가는 것 방지 */
    display: block;
}

#docEl, #wrDocEl {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
}
/* ---------------------------------- */
</style>
</head>
<body>

<script>
/* --- [기존 변수 및 유틸 유지] --- */
var SB_URL='https://qrqwwmqwjvdxkqzqcvon.supabase.co';
var SB_KEY='sb_publishable_TarBw0KYOV1ODaaEjvRGhA_hYRHeJcH';
// ... (중략) ...

/* --- [수정사항 2: 저장 로직 및 히스토리 갱신] --- */
async function saveToDb(){
    if(!validate()) return;
    var e = window._est;
    var seq = Math.max(1, parseInt(document.getElementById('docSeq').value) || 1);
    
    var data = {
        doc_number: Y + '_' + String(seq).padStart(4, '0'),
        doc_date: val('date') || null,
        company_name: val('companyName'),
        contact_person: val('contactPerson'),
        title: val('title'),
        manager: val('manager'),
        product_name: val('productName'),
        quantity: toNum(val('quantity')),
        unit: val('unit'),
        unit_price: toNum(val('unitPrice')),
        unit_price_vat: val('unitPriceVat'),
        color: val('color'),
        print_color_size: val('printColorSize'),
        print_method: val('printMethod'),
        print_fee: toNum(val('printFee')) || 0,
        print_fee_vat: val('printFeeVat'),
        print_fee_apply: val('printFeeApply'),
        packaging: val('packaging'),
        packaging_fee: toNum(val('packagingFee')) || 0,
        packaging_fee_vat: val('packagingFeeVat'),
        packaging_fee_apply: val('packagingFeeApply'),
        delivery_date: val('deliveryDate') || null,
        delivery_address: val('deliveryAddress'),
        show_payment_notice: document.getElementById('showPaymentNotice').checked,
        total_amount: e ? e.grand : 0,
        status: '작성중'
    };

    try {
        // 'Prefer': 'return=representation' 헤더를 추가해야 결과값이 반환되어 확인이 쉽습니다.
        var res = await fetch(SB_URL + '/rest/v1/confirmations', {
            method: 'POST',
            headers: {
                'apikey': SB_KEY,
                'Authorization': 'Bearer ' + SB_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            showMsg('✅ 저장 완료! 히스토리를 갱신합니다.');
            loadHistory(); // 저장 성공 후 즉시 히스토리 로드
        } else {
            showMsg('❌ 저장 실패 (상태 코드: ' + res.status + ')', true);
        }
    } catch (err) {
        showMsg('❌ 에러 발생: ' + err.message, true);
    }
}

/* --- [수정사항 3: A4 출력을 위한 배율 조정 함수 수정] --- */
function fitToA4(containerId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    
    // 강제로 A4 사이즈 세팅
    container.style.width = '794px';
    container.style.height = '1123px';
    container.style.transform = 'none'; // 억지로 늘리는 비율 제거
    container.style.overflow = 'hidden';
}

/* --- [수정사항 4: 다운로드 시 고해상도 유지] --- */
async function dl(type) {
    var el = document.getElementById('docEl');
    var b1 = document.getElementById('btnPng'), b2 = document.getElementById('btnPdf');
    
    b1.disabled = b2.disabled = true;
    
    try {
        // html2canvas 실행 시 scale을 높여 A4 출력 품질을 확보합니다.
        var canvas = await html2canvas(el, {
            scale: 3, 
            useCORS: true,
            backgroundColor: '#fff',
            width: 794,
            height: 1123
        });

        var name = val('companyName') || 'KLP';
        if (type === 'png') {
            var a = document.createElement('a');
            a.download = '디자인확인서_' + name + '.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        } else {
            var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            var imgData = canvas.toDataURL('image/jpeg', 1.0);
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            pdf.save('디자인확인서_' + name + '.pdf');
        }
    } catch (err) {
        alert('다운로드 중 오류 발생: ' + err.message);
    }
    b1.disabled = b2.disabled = false;
}
// ... (나머지 코드 유지) ...
</script>
</body>
</html>
